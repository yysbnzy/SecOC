name: Build and Release SecOC Toolkit

on:
  # 手动触发
  workflow_dispatch:
    inputs:
      version:
        description: '版本号 (如: v1.1.0)'
        required: true
        default: 'v1.1.0'
  # 推送 tag 时自动触发
  push:
    tags:
      - 'v*'

permissions:
  contents: write  # 允许上传 Release

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller
        
    - name: Build portable EXE
      run: python build_exe.py
      
    - name: Rename output
      run: |
        $version = "${{ github.event.inputs.version || github.ref_name }}"
        $src = "dist/SecOCToolkit.exe"
        $dst = "dist/SecOCToolkit-$version.exe"
        Copy-Item $src $dst
        Write-Host "Output: $dst"
        
    - name: Upload to Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: ${{ github.event.inputs.version || github.ref_name }}
        name: SecOC Toolkit ${{ github.event.inputs.version || github.ref_name }}
        files: dist/SecOCToolkit-*.exe
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
